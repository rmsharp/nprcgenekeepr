# Workflow for shinytest2 Shiny application tests
# Runs browser-based tests for the GeneKeepR Shiny application

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

name: shinytest2

permissions: read-all

jobs:
  shinytest2:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::shinytest2
            any::chromote
          needs: check

      - name: Install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser

      - name: Run shinytest2 tests
        run: |
          # Set up chromote to use installed Chromium
          Sys.setenv(CHROMOTE_CHROME = "/usr/bin/chromium-browser")

          # Run only shinytest2 tests
          testthat::test_file(
            "tests/testthat/test-app-loading.R",
            reporter = testthat::CheckReporter$new()
          )
          testthat::test_file(
            "tests/testthat/test-app-navigation.R",
            reporter = testthat::CheckReporter$new()
          )
        shell: Rscript {0}
        continue-on-error: true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shinytest2-results
          path: |
            tests/testthat/_snaps/
            *.png
          if-no-files-found: ignore
